{% extends "base.html" %}
{% block title %}Чат с {{ other.email }} — PandaTutor{% endblock %}
{% block content %}
<div class="container">
  <div class="chat-layout">
    <div class="chat-list">
      <a href="{{ url_for('chat.index') }}" style="display: block; padding: 1rem; border-bottom: 1px solid var(--border);">← Все чаты</a>
      <a href="{{ url_for('chat.conversation', user_id=other.id) }}" class="chat-item active">{{ other.email }}</a>
    </div>
    <div class="chat-messages">
      <div style="padding: 1rem; border-bottom: 1px solid var(--border); font-weight: 600;">{{ other.email }}</div>
      <div class="chat-messages-list" id="chatMessages">
        {% for m in messages %}
        <div class="chat-msg {{ 'own' if m.sender_id == current_user.id else 'other' }}">
          {{ m.text }}
          <small style="display: block; margin-top: 0.25rem; opacity: 0.8;">{{ m.timestamp.strftime('%d.%m %H:%M') }}</small>
        </div>
        {% endfor %}
      </div>
      <form class="chat-form" id="chatForm">
        <input type="hidden" id="receiverId" value="{{ other.id }}">
        <input type="text" id="messageText" placeholder="Сообщение..." autocomplete="off">
        <button type="submit" class="btn btn-primary">Отправить</button>
      </form>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
<script>
(function() {
  const receiverId = parseInt(document.getElementById('receiverId').value, 10);
  const form = document.getElementById('chatForm');
  const input = document.getElementById('messageText');
  const list = document.getElementById('chatMessages');

  const socket = io({
    transports: ['websocket', 'polling'],
    withCredentials: true
  });

  socket.on('connect', function() {
    socket.emit('join_conversation', { user_id: receiverId });
  });

  socket.on('new_message', function(data) {
    const isOwn = data.sender_id === {{ current_user.id }};
    const div = document.createElement('div');
    div.className = 'chat-msg ' + (isOwn ? 'own' : 'other');
    const date = data.timestamp ? new Date(data.timestamp) : new Date();
    const timeStr = date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' }) + ' ' + date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    div.innerHTML = data.text + '<small style="display: block; margin-top: 0.25rem; opacity: 0.8;">' + timeStr + '</small>';
    list.appendChild(div);
    list.scrollTop = list.scrollHeight;
  });

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    const text = (input.value || '').trim();
    if (!text) return;
    socket.emit('send_message', { receiver_id: receiverId, text: text });
    input.value = '';
  });
})();
</script>
{% endblock %}
